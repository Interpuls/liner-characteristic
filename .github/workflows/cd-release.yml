name: CD (Release Published)

on:
  release:
    types: [published]

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy Production
    # Do not auto-deploy prereleases (e.g. v1.2.3-rc.1) to production.
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd ~/liner-app
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            export IMAGE_TAG='${{ github.event.release.tag_name }}'
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.release.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.release.yml up -d backend frontend
            curl -fsS https://mi-linerlens.milkrite-interpuls.com/healthz
