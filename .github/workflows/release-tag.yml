name: Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without prefix (example: 1.2.3 or 1.2.3-rc.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-tag
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check required secret
        run: |
          if [ -z "${{ secrets.RELEASE_PAT }}" ]; then
            echo "Missing secret RELEASE_PAT"
            exit 1
          fi

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Version must match X.Y.Z or X.Y.Z-rc.N (example: 1.2.3 or 1.2.3-rc.1)"
            exit 1
          fi
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Check tag does not exist
        run: |
          git fetch --tags --force
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 1
          fi

      - name: Create and push tag
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git" "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          prerelease: ${{ env.IS_PRERELEASE }}
          generate_release_notes: true
