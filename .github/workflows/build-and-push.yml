name: Build and push images (GHCR)

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ghcr.io/interpuls/liner-backend:sha-${{ github.sha }}
            ghcr.io/interpuls/liner-backend:prod

      - name: Build & push frontend (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ghcr.io/interpuls/liner-frontend:sha-${{ github.sha }}
            ghcr.io/interpuls/liner-frontend:prod
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }}

      - name: Build & push backend (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ghcr.io/interpuls/liner-backend:sha-${{ github.sha }}
            ghcr.io/interpuls/liner-backend:${{ github.ref_name }}

      - name: Build & push frontend (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ghcr.io/interpuls/liner-frontend:sha-${{ github.sha }}
            ghcr.io/interpuls/liner-frontend:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }}

  sbom:
    name: Generate SBOM (release tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR (retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin && exit 0
            echo "GHCR login failed (attempt $i/5), retrying..."
            sleep 5
          done
          echo "GHCR login failed after 5 attempts"
          exit 1

      - name: Generate backend SBOM (CycloneDX JSON)
        run: |
          for i in 1 2 3; do
            docker run --rm \
              ghcr.io/anchore/syft:latest \
              ghcr.io/interpuls/liner-backend:${{ github.ref_name }} \
              -o cyclonedx-json > sbom-backend-${{ github.ref_name }}.json && exit 0
            echo "Backend SBOM generation failed (attempt $i/3), retrying..."
            sleep 5
          done
          echo "Backend SBOM generation failed after 3 attempts"
          exit 1

      - name: Generate frontend SBOM (CycloneDX JSON)
        run: |
          for i in 1 2 3; do
            docker run --rm \
              ghcr.io/anchore/syft:latest \
              ghcr.io/interpuls/liner-frontend:${{ github.ref_name }} \
              -o cyclonedx-json > sbom-frontend-${{ github.ref_name }}.json && exit 0
            echo "Frontend SBOM generation failed (attempt $i/3), retrying..."
            sleep 5
          done
          echo "Frontend SBOM generation failed after 3 attempts"
          exit 1

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: |
            sbom-backend-${{ github.ref_name }}.json
            sbom-frontend-${{ github.ref_name }}.json
